<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ลงนามรับทราบประจำวัน | แผนกรังสีวิทยา BPK9</title>
<link rel="icon" href="assets/bpk9-logo.png" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<header class="topbar"><div id="app-header"></div></header>

<main class="shell">
  <section class="pagehead">
    <div class="eyebrow"><span class="dot"></span>ข้อมูลจากชีต “ลงนามรับทราบประจำวัน”</div>
    <h1 class="page-title">ลงนามรับทราบประจำวัน</h1>
    <p class="page-sub">สรุปและค้นหาการลงนามรับทราบการมอบหมายงานประจำวันของเจ้าหน้าที่ ข้อมูลอัปเดตอัตโนมัติจาก Google Sheet ทุกครั้งที่เปิดหน้านี้</p>
  </section>

  <div class="kpis" id="kpis">
    <div class="kpi"><div class="k-label">รายการทั้งหมด</div><div class="k-value">–</div></div>
    <div class="kpi"><div class="k-label">ลงนามวันนี้</div><div class="k-value">–</div></div>
    <div class="kpi"><div class="k-label">เจ้าหน้าที่ไม่ซ้ำ (ในผลค้นหา)</div><div class="k-value">–</div></div>
    <div class="kpi"><div class="k-label">อัปเดตล่าสุด</div><div class="k-value">–</div></div>
  </div>

  <div class="card card-pad">
    <div class="toolbar">
      <div class="field">
        <label for="f-date">วันที่</label>
        <input type="date" id="f-date" />
      </div>
      <div class="field">
        <label for="f-name">ค้นหาชื่อ / รหัสเวร</label>
        <input type="text" id="f-name" placeholder="เช่น ชุติกาญจน์ หรือ D7" />
      </div>
      <div class="field">
        <label for="f-role">วิชาชีพ</label>
        <select id="f-role"><option value="">ทั้งหมด</option></select>
      </div>
      <div class="field">
        <label for="f-shift">กะเวร</label>
        <select id="f-shift"><option value="">ทั้งหมด</option></select>
      </div>
      <button class="btn btn-outline" id="btn-clear" style="align-self:flex-end;">ล้างตัวกรอง</button>
      <button class="btn btn-primary" id="btn-refresh" style="align-self:flex-end;margin-left:auto;">🔄 รีเฟรชข้อมูล</button>
    </div>

    <div id="content">
      <div class="state-msg"><div class="spinner"></div><span>กำลังโหลดข้อมูลจาก Google Sheet…</span></div>
    </div>
  </div>

  <footer id="app-footer"></footer>
</main>

<script src="assets/common.js"></script>
<script>
let ALL_ROWS = [];

async function load() {
  const content = document.getElementById("content");
  try {
    const { cols, rows } = await fetchGvizSheet(SHEETS.dailySignoff);
    const objs = rowsToObjects(cols, rows).filter(r => (r["ลงนามรับทราบการมอบหมายงานประจำวัน"] || "").trim() !== "");

    ALL_ROWS = objs.map(r => {
      const d = parseGvizDate(r["ประทับเวลา"]);
      const duties = [
        r["หน้าที่ที่ได้รับมอบหมายประจำวัน"],
        r["หน้าที่ที่ได้รับมอบหมายประจำวัน 2"],
        r["หน้าที่ที่ได้รับมอบหมายประจำวัน 3"],
      ].filter(Boolean);
      return {
        date: d,
        name: r["ลงนามรับทราบการมอบหมายงานประจำวัน"] || "",
        role: r["วิชาชีพ"] || "",
        shiftCode: r["รหัสเวร (กรุณาระบุรหัสเวร)"] || r["รหัสเวร"] || "",
        shift: r["กะเวร"] || "",
        duties,
      };
    }).filter(r => r.date);

    populateSelect("f-role", [...new Set(ALL_ROWS.map(r => r.role))].filter(Boolean).sort());
    populateSelect("f-shift", [...new Set(ALL_ROWS.map(r => r.shift))].filter(Boolean).sort());

    render();
  } catch (err) {
    content.innerHTML = `<div class="state-msg"><div class="s-icon">⚠️</div><b>โหลดข้อมูลไม่สำเร็จ</b><span>${escapeHTML(err.message)}</span></div>`;
    showToast(err.message, "error");
  }
}

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}

function render() {
  const fDate = document.getElementById("f-date").value;
  const fName = document.getElementById("f-name").value.trim().toLowerCase();
  const fRole = document.getElementById("f-role").value;
  const fShift = document.getElementById("f-shift").value;

  let filtered = ALL_ROWS.filter(r => {
    if (fDate && toISODate(r.date) !== fDate) return false;
    if (fRole && r.role !== fRole) return false;
    if (fShift && r.shift !== fShift) return false;
    if (fName) {
      const hay = (r.name + " " + r.shiftCode).toLowerCase();
      if (!hay.includes(fName)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => b.date - a.date);

  // KPIs
  const today = toISODate(new Date());
  const todayCount = ALL_ROWS.filter(r => toISODate(r.date) === today).length;
  const uniqueStaff = new Set(filtered.map(r => r.name)).size;
  const lastUpdate = ALL_ROWS.length ? ALL_ROWS.reduce((m, r) => r.date > m ? r.date : m, ALL_ROWS[0].date) : null;

  const kpiEls = document.querySelectorAll("#kpis .k-value");
  kpiEls[0].innerHTML = `${ALL_ROWS.length}<small>รายการ</small>`;
  kpiEls[1].innerHTML = `${todayCount}<small>คน</small>`;
  kpiEls[2].innerHTML = `${uniqueStaff}<small>คน</small>`;
  kpiEls[3].innerHTML = lastUpdate ? `${toBEDate(lastUpdate)}` : "-";

  const content = document.getElementById("content");
  if (!filtered.length) {
    content.innerHTML = `<div class="state-msg"><div class="s-icon">🔍</div><b>ไม่พบรายการที่ตรงกับตัวกรอง</b><span>ลองล้างตัวกรองหรือเลือกวันที่อื่น</span></div>`;
    return;
  }

  const rowsHTML = filtered.map(r => `
    <tr>
      <td class="mono" style="white-space:nowrap;">${toBEDate(r.date)}<br/><span class="muted text-sm">${toTimeHM(r.date)} น.</span></td>
      <td><b>${escapeHTML(r.name)}</b></td>
      <td><span class="badge badge-teal">${escapeHTML(r.role)}</span></td>
      <td class="mono">${escapeHTML(r.shiftCode)}</td>
      <td>${escapeHTML(r.shift)}</td>
      <td>${r.duties.map(zoneTagsHTML).join(" ")}</td>
    </tr>`).join("");

  content.innerHTML = `
    <p class="hint" style="margin:2px 0 12px;">พบ ${filtered.length} รายการ</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>วันที่ / เวลา</th><th>ชื่อผู้ลงนาม</th><th>วิชาชีพ</th><th>รหัสเวร</th><th>กะเวร</th><th>หน้าที่ที่ได้รับมอบหมาย</th></tr></thead>
        <tbody>${rowsHTML}</tbody>
      </table>
    </div>`;
}

["f-date","f-name","f-role","f-shift"].forEach(id => {
  document.getElementById(id).addEventListener("input", render);
  document.getElementById(id).addEventListener("change", render);
});
document.getElementById("btn-clear").addEventListener("click", () => {
  document.getElementById("f-date").value = "";
  document.getElementById("f-name").value = "";
  document.getElementById("f-role").value = "";
  document.getElementById("f-shift").value = "";
  render();
});
document.getElementById("btn-refresh").addEventListener("click", load);

load();
</script>
</body>
</html>
