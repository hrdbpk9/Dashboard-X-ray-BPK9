<style>
/* ==========================================================================
   BPK9 Radiology Ops — shared theme
   ========================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --teal-900:#0F3A37;
  --teal-800:#134D48;
  --teal-700:#1C6B64;
  --teal-600:#238880;
  --teal-500:#2CA093;
  --teal-400:#4FB8AC;
  --teal-200:#B6E4DD;
  --teal-100:#E1F5F1;
  --red-600:#DC2E27;
  --red-500:#E9463D;
  --red-100:#FCE4E2;
  --ink:#122624;
  --slate:#5B7370;
  --slate-light:#89A19D;
  --bg:#F5FAF9;
  --card:#FFFFFF;
  --border:#DCEAE7;
  --amber:#B9791D;
  --amber-bg:#FBF0DD;

  /* work-zone colors, lifted straight from the department's own shift-tag system */
  --zone-orange:#E27C34;   /* MRI */
  --zone-yellow:#D2A517;   /* CT / Counter ชั้น1 */
  --zone-blue:#2E8FBF;     /* US ชั้น1 */
  --zone-purple:#8E5DB8;   /* US ชั้น3 */
  --zone-pink:#D8548B;     /* Check up / Counter ชั้น3 */
  --zone-green:#4C9A4A;    /* ช่วยทุก Job */
  --zone-clear:#7C8F8C;    /* Gen / ใส */
  --zone-red:#C9432F;      /* Gen+CT ชั้น1 */

  --radius-s:8px;
  --radius-m:14px;
  --radius-l:22px;
  --shadow-card:0 1px 2px rgba(15,58,55,.06), 0 6px 20px rgba(15,58,55,.06);
  --shadow-pop:0 12px 32px rgba(15,58,55,.16);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:
    radial-gradient(1100px 480px at 100% -10%, var(--teal-100) 0%, transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:'Noto Sans Thai', system-ui, sans-serif;
  font-weight:400;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono', ui-monospace, monospace;}

a{color:inherit;}
img{max-width:100%;display:block;}
button{font-family:inherit;}

/* ---------- Layout shell ---------- */
.shell{max-width:1180px;margin:0 auto;padding:0 24px;}

.topbar{
  position:sticky; top:0; z-index:40;
  background:rgba(245,250,249,.86);
  backdrop-filter:blur(10px) saturate(1.2);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  display:flex; align-items:center; gap:18px;
  padding:12px 24px;
  max-width:1180px; margin:0 auto;
}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;}
.brand img{height:34px;width:auto;}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-text b{font-size:14.5px;font-weight:800;color:var(--teal-800);}
.brand-text span{font-size:11.5px;color:var(--slate);font-weight:500;letter-spacing:.02em;}

.topnav{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;}
.topnav a{
  display:flex; align-items:center; gap:6px;
  padding:9px 14px;border-radius:999px;
  font-size:14px;font-weight:600;color:var(--teal-800);
  text-decoration:none; transition:background .15s, color .15s;
  white-space:nowrap;
}
.topnav a:hover{background:var(--teal-100);}
.topnav a.active{background:var(--teal-700);color:#fff;}

/* ---------- Hero / page head ---------- */
.pagehead{padding:38px 0 26px;}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12.5px;font-weight:700;letter-spacing:.06em;
  color:var(--teal-700);background:var(--teal-100);
  padding:6px 12px;border-radius:999px;margin-bottom:14px;
}
.eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--red-600);}
h1.page-title{
  font-size:clamp(26px,3.4vw,38px);
  font-weight:800; letter-spacing:-.01em; margin:0 0 8px;color:var(--teal-900);
}
.page-sub{color:var(--slate);font-size:15.5px;max-width:640px;margin:0;}

/* ---------- Cards ---------- */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-l);
  box-shadow:var(--shadow-card);
}
.card-pad{padding:22px;}

/* Home nav cards */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
@media (max-width:900px){.grid-3{grid-template-columns:1fr;}}
.navcard{
  position:relative;overflow:hidden;
  padding:26px 22px;border-radius:var(--radius-l);
  background:var(--card);border:1px solid var(--border);
  text-decoration:none;color:var(--ink);
  box-shadow:var(--shadow-card);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  display:flex;flex-direction:column;gap:12px;min-height:210px;
}
.navcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-pop);border-color:var(--teal-400);}
.navcard .nc-icon{
  width:46px;height:46px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  background:var(--teal-100);color:var(--teal-700);
  font-size:22px;
}
.navcard h3{margin:0;font-size:18.5px;font-weight:800;color:var(--teal-900);}
.navcard p{margin:0;color:var(--slate);font-size:14px;flex:1;}
.navcard .nc-go{
  font-size:13px;font-weight:700;color:var(--teal-700);
  display:flex;align-items:center;gap:6px;
}
.navcard.red .nc-icon{background:var(--red-100);color:var(--red-600);}
.navcard.red .nc-go{color:var(--red-600);}

/* ---------- KPI stat row ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0;}
@media (max-width:820px){.kpis{grid-template-columns:repeat(2,1fr);}}
.kpi{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-m);
  padding:16px 18px;
}
.kpi .k-label{font-size:12.5px;color:var(--slate);font-weight:600;margin-bottom:6px;}
.kpi .k-value{font-size:26px;font-weight:800;color:var(--teal-800);font-family:'IBM Plex Mono',monospace;}
.kpi .k-value small{font-size:13px;font-weight:600;color:var(--slate-light);margin-left:4px;}

/* ---------- Toolbar / filters ---------- */
.toolbar{
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  margin:18px 0;
}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:12px;font-weight:700;color:var(--teal-700);}
input[type=text],input[type=date],input[type=number],input[type=time],select,textarea{
  font-family:inherit;font-size:14px;color:var(--ink);
  border:1px solid var(--border);background:#fff;
  border-radius:var(--radius-s);padding:9px 12px;
  outline:none; transition:border-color .15s, box-shadow .15s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--teal-500);box-shadow:0 0 0 3px var(--teal-100);
}
.btn{
  display:inline-flex;align-items:center;gap:8px;justify-content:center;
  padding:10px 18px;border-radius:999px;border:none;cursor:pointer;
  font-size:14.5px;font-weight:700;text-decoration:none;
  transition:transform .12s ease, box-shadow .12s ease, background .15s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--teal-700);color:#fff;box-shadow:0 6px 16px rgba(28,107,100,.28);}
.btn-primary:hover{background:var(--teal-800);}
.btn-ghost{background:var(--teal-100);color:var(--teal-800);}
.btn-ghost:hover{background:var(--teal-200);}
.btn-outline{background:#fff;color:var(--teal-700);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--teal-400);}
.btn-danger{background:var(--red-600);color:#fff;}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ---------- Badges / tags ---------- */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;
  white-space:nowrap;
}
.badge-teal{background:var(--teal-100);color:var(--teal-800);}
.badge-red{background:var(--red-100);color:var(--red-600);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-gray{background:#EEF3F2;color:var(--slate);}
.badge-outline{background:#fff;border:1px solid var(--border);color:var(--slate);}

.zone-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;color:#fff;
}
.zone-tag .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.85);}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-m);background:#fff;}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px;}
thead th{
  text-align:left;background:var(--teal-900);color:#fff;
  font-size:12px;font-weight:700;letter-spacing:.02em;
  padding:11px 14px;position:sticky;top:0;
}
tbody td{padding:11px 14px;border-top:1px solid var(--border);vertical-align:top;}
tbody tr:hover{background:var(--teal-100)/.4;background:#F3FBFA;}
tbody tr:nth-child(even){background:#FAFDFC;}
tbody tr:nth-child(even):hover{background:#F3FBFA;}

/* ---------- Day cards (handover) ---------- */
.day-list{display:flex;flex-direction:column;gap:14px;margin-top:18px;}
.day-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius-m);
  padding:18px 20px;box-shadow:var(--shadow-card);
}
.day-head{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px;}
.day-date{font-weight:800;color:var(--teal-900);font-size:16px;}
.day-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px 20px;}
.dg-item .dg-label{font-size:11.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.dg-item .dg-value{font-size:14px;color:var(--ink);}
.day-note{
  margin-top:12px;padding:12px 14px;background:var(--teal-100);border-radius:10px;
  font-size:13.5px;color:var(--teal-900);white-space:pre-wrap;line-height:1.55;
}
.day-risk{
  margin-top:12px;padding:12px 14px;background:var(--red-100);border-radius:10px;
  font-size:13.5px;color:#7A1B15;white-space:pre-wrap;line-height:1.55;
}

/* ---------- Forms (training page) ---------- */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media (max-width:720px){.form-grid{grid-template-columns:1fr;}}
.form-grid .field.span2{grid-column:1/-1;}

.attendee-row{
  display:grid;
  grid-template-columns:1.4fr 1fr .8fr 1fr .6fr .6fr .6fr auto;
  gap:8px;align-items:end;
  padding:12px;border:1px dashed var(--border);border-radius:10px;margin-bottom:10px;background:#FBFEFD;
}
@media (max-width:980px){.attendee-row{grid-template-columns:1fr 1fr;}}
.attendee-row .field label{font-size:11px;}
.row-remove{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--border);
  background:#fff;color:var(--red-600);cursor:pointer;font-size:16px;line-height:1;
}
.row-remove:hover{background:var(--red-100);border-color:var(--red-500);}

.section-title{
  display:flex;align-items:center;gap:10px;
  font-size:16px;font-weight:800;color:var(--teal-900);margin:26px 0 12px;
}
.section-title .num{
  width:26px;height:26px;border-radius:50%;background:var(--teal-700);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'IBM Plex Mono',monospace;
}

.hint{font-size:12.5px;color:var(--slate-light);}

/* ---------- States ---------- */
.state-msg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:50px 20px;color:var(--slate);text-align:center;
}
.state-msg .s-icon{font-size:30px;}
.spinner{
  width:22px;height:22px;border-radius:50%;
  border:3px solid var(--teal-200);border-top-color:var(--teal-600);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--teal-900);color:#fff;padding:14px 22px;border-radius:12px;
  font-size:14px;font-weight:600;box-shadow:var(--shadow-pop);
  opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;
  z-index:100;display:flex;align-items:center;gap:10px;max-width:90vw;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red-600);}

footer{
  margin:60px 0 30px;padding-top:22px;border-top:1px solid var(--border);
  color:var(--slate-light);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
}

/* Utility */
.flex{display:flex;}
.gap-8{gap:8px;}.gap-12{gap:12px;}
.mt-0{margin-top:0;}
.text-sm{font-size:13px;}
.muted{color:var(--slate);}
.right{margin-left:auto;}
.hidden{display:none !important;}

</style>

<script>
/* ==========================================================================
   BPK9 Radiology Ops — shared utilities
   ========================================================================== */

// ⚠️ ตั้งค่าตรงนี้ให้ตรงกับไฟล์ Google Sheet จริงของแผนก
const SHEET_ID = "18AzF55gPVcpmbPdEjKGGENAHZ1srb1Htq2DKsGyxVLk";

// ชื่อแท็บ (Tab) ต้องตรงกับ Google Sheet เป๊ะๆ (รวมช่องว่าง/จุด) — แก้ตรงนี้ถ้าไม่ตรง
const SHEETS = {
  dailySignoff: "ลงนามรับทราบประจำวัน เริ่ม 1 ก.ค.69",
  nightShift: "ส่งเวรดึก",
  training: "ข้อมูลอบรม",
};

// ตั้งค่า URL ของ Apps Script Web App หลัง deploy แล้ว (ดูขั้นตอนใน apps-script/Code.gs)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/PASTE_YOUR_DEPLOYMENT_ID_HERE/exec";

/* ---------- gviz fetch (อ่านข้อมูลจาก Google Sheet ผ่าน docs.google.com — ไม่โดนบล็อกโดย wifi รพ.) ---------- */
async function fetchGvizSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`โหลดชีต "${sheetName}" ไม่สำเร็จ (HTTP ${res.status})`);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
  if (!match) throw new Error(`ไม่พบชีตชื่อ "${sheetName}" ในไฟล์ กรุณาตรวจสอบชื่อแท็บให้ตรงกับ Google Sheet`);
  const data = JSON.parse(match[1]);
  if (data.status === "error") {
    const msg = (data.errors && data.errors[0] && data.errors[0].detailed_message) || "เกิดข้อผิดพลาดในการอ่านข้อมูล";
    throw new Error(msg);
  }
  const cols = data.table.cols.map((c, i) => (c.label || c.id || `col${i}`).trim());
  const rows = (data.table.rows || []).map((r) =>
    r.c.map((cell) => {
      if (!cell) return "";
      if (cell.f !== undefined && cell.f !== null) return cell.f; // formatted string (dates etc.)
      return cell.v === null || cell.v === undefined ? "" : cell.v;
    })
  );
  return { cols, rows };
}

// แปลง array-of-arrays ให้เป็น array of object {colName: value}
function rowsToObjects(cols, rows) {
  return rows.map((r) => {
    const obj = {};
    cols.forEach((c, i) => (obj[c] = r[i] !== undefined ? r[i] : ""));
    return obj;
  });
}

/* ---------- date helpers ---------- */
const THAI_MONTHS = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
const THAI_MONTHS_FULL = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

// gviz มักส่งวันที่แบบ "Date(2026,6,16,7,4,28)" มาใน cell.v ถ้าไม่มี .f — เผื่อไว้
function parseGvizDate(value) {
  if (value instanceof Date) return value;
  if (typeof value === "string") {
    const m = value.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);
    if (m) {
      return new Date(+m[1], +m[2], +m[3], +(m[4] || 0), +(m[5] || 0), +(m[6] || 0));
    }
    const d = new Date(value);
    if (!isNaN(d)) return d;
  }
  return null;
}

function toBEDate(d) {
  if (!d) return "-";
  return `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear() + 543}`;
}
function toBEDateFull(d) {
  if (!d) return "-";
  return `${d.getDate()} ${THAI_MONTHS_FULL[d.getMonth()]} ${d.getFullYear() + 543}`;
}
function toISODate(d) {
  if (!d) return "";
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function toTimeHM(d) {
  if (!d) return "";
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

/* ---------- zone tag coloring (สีเวรตามระบบของแผนกเอง) ---------- */
const ZONE_MAP = [
  { key: "ส้ม", color: "var(--zone-orange)" },
  { key: "เหลือง", color: "var(--zone-yellow)" },
  { key: "ฟ้า", color: "var(--zone-blue)" },
  { key: "ม่วง", color: "var(--zone-purple)" },
  { key: "ชมพู", color: "var(--zone-pink)" },
  { key: "เขียว", color: "var(--zone-green)" },
  { key: "แดง", color: "var(--zone-red)" },
  { key: "ใส", color: "var(--zone-clear)" },
];
function zoneTagsHTML(text) {
  if (!text) return "";
  const found = ZONE_MAP.filter((z) => text.includes(z.key));
  if (!found.length) {
    return `<span class="zone-tag" style="background:var(--slate-light)"><span class="dot"></span>${escapeHTML(text)}</span>`;
  }
  return found
    .map((z) => `<span class="zone-tag" style="background:${z.color}"><span class="dot"></span>${escapeHTML(text)}</span>`)
    .join(" ");
}

function escapeHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ---------- toast ---------- */
let toastTimer;
function showToast(msg, type = "ok") {
  let el = document.getElementById("app-toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "app-toast";
    el.className = "toast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = "toast show" + (type === "error" ? " error" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
}

<script>
let ALL_ROWS = [];

function isRisk(v) {
  const s = (v || "").trim();
  return s && !s.includes("ไม่มี") && s !== "-";
}
function isPending(v) {
  const s = (v || "").trim();
  return s.includes("ค้างส่ง") || s.includes("รอแพทย์");
}
function numOrDash(v) {
  const s = String(v ?? "").trim();
  if (s === "" || s === "-") return null;
  const n = parseInt(s, 10);
  return isNaN(n) ? null : n;
}

async function load() {
  const content = document.getElementById("content");
  try {
    const { cols, rows } = await fetchGvizSheet(SHEETS.nightShift);
    const objs = rowsToObjects(cols, rows).filter(r => (r["ประทับเวลา"] || "") !== "");

    ALL_ROWS = objs.map(r => {
      const d = parseGvizDate(r["ประทับเวลา"]);
      return {
        date: d,
        docStatus: r["🔴 ส่งเอกสารเวชระเบียน"] || "",
        general: r["🟢 สถานการณ์ทั่วไป"] || "",
        ctCases: r["🖥 CT  (ระบุจำนวนเคส)"] ?? r["🖥 CT (ระบุจำนวนเคส)"] ?? "",
        ctDoctor: r["🖥 CT  (ระบุแพทย์ที่่อ่าน)"] ?? r["🖥 CT (ระบุแพทย์ที่อ่าน)"] ?? "",
        mriCases: r["🧲 MRI (ระบุจำนวนเคส)  หลัง 23.00 น."] ?? "",
        mriDoctor: r["🧲 MRI    (ระบุแพทย์ที่่อ่าน)  หลัง 23.00 น."] ?? "",
        risk: r["⚠️ เหตุการณ์ความเสี่ยง"] || "",
        handoverNote: r["🔄 สิ่งที่ต้องส่งต่อเวรถัดไป"] || "",
        sender: r["👤 ผู้ส่งเวร"] || "",
        receiver: r["👤 ผู้รับเวร"] || "",
        note: r["Note"] || "",
      };
    }).filter(r => r.date);

    render();
  } catch (err) {
    content.innerHTML = `<div class="state-msg"><div class="s-icon">⚠️</div><b>โหลดข้อมูลไม่สำเร็จ</b><span>${escapeHTML(err.message)}</span></div>`;
    showToast(err.message, "error");
  }
}

function render() {
  const fDate = document.getElementById("f-date").value;
  const fName = document.getElementById("f-name").value.trim().toLowerCase();
  const fRisk = document.getElementById("f-risk").value;

  let filtered = ALL_ROWS.filter(r => {
    if (fDate && toISODate(r.date) !== fDate) return false;
    if (fRisk === "risk" && !isRisk(r.risk)) return false;
    if (fRisk === "pending" && !isPending(r.docStatus)) return false;
    if (fName) {
      const hay = (r.sender + " " + r.receiver).toLowerCase();
      if (!hay.includes(fName)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => b.date - a.date);

  // KPIs (computed over full dataset, not filtered, to represent overall picture)
  const riskCount = ALL_ROWS.filter(r => isRisk(r.risk)).length;
  const ctNums = ALL_ROWS.map(r => numOrDash(r.ctCases)).filter(n => n !== null);
  const avgCt = ctNums.length ? (ctNums.reduce((a,b) => a+b, 0) / ctNums.length).toFixed(1) : "-";
  const lastDate = ALL_ROWS.length ? ALL_ROWS.reduce((m, r) => r.date > m ? r.date : m, ALL_ROWS[0].date) : null;

  const kpiEls = document.querySelectorAll("#kpis .k-value");
  kpiEls[0].innerHTML = `${ALL_ROWS.length}<small>คืน</small>`;
  kpiEls[1].innerHTML = `${riskCount}<small>ครั้ง</small>`;
  kpiEls[2].innerHTML = `${avgCt}<small>เคส</small>`;
  kpiEls[3].innerHTML = lastDate ? `${toBEDate(lastDate)}` : "-";

  const content = document.getElementById("content");
  if (!filtered.length) {
    content.innerHTML = `<div class="state-msg"><div class="s-icon">🔍</div><b>ไม่พบรายการที่ตรงกับตัวกรอง</b><span>ลองล้างตัวกรองหรือเลือกวันที่อื่น</span></div>`;
    return;
  }

  content.innerHTML = `
    <p class="hint" style="margin:2px 0 12px;">พบ ${filtered.length} บันทึก</p>
    <div class="day-list">${filtered.map(dayCardHTML).join("")}</div>`;
}

function dayCardHTML(r) {
  const risky = isRisk(r.risk);
  const pending = isPending(r.docStatus);
  return `
  <div class="day-card">
    <div class="day-head">
      <span class="day-date">${toBEDateFull(r.date)}</span>
      <span class="badge badge-gray mono">${toTimeHM(r.date)} น.</span>
      ${risky ? `<span class="badge badge-red">⚠️ มีเหตุการณ์ความเสี่ยง</span>` : `<span class="badge badge-teal">ไม่มีเหตุการณ์ความเสี่ยง</span>`}
      ${pending ? `<span class="badge badge-amber">เอกสารค้างเซ็น</span>` : ""}
    </div>
    <div class="day-grid">
      <div class="dg-item"><div class="dg-label">ส่งเอกสารเวชระเบียน</div><div class="dg-value">${escapeHTML(r.docStatus) || "-"}</div></div>
      <div class="dg-item"><div class="dg-label">สถานการณ์ทั่วไป</div><div class="dg-value">${escapeHTML(r.general) || "-"}</div></div>
      <div class="dg-item"><div class="dg-label">CT (จำนวนเคส / แพทย์อ่าน)</div><div class="dg-value">${escapeHTML(r.ctCases) || "0"} เคส · ${escapeHTML(r.ctDoctor) || "-"}</div></div>
      <div class="dg-item"><div class="dg-label">MRI หลัง 23:00 (จำนวนเคส / แพทย์อ่าน)</div><div class="dg-value">${escapeHTML(r.mriCases) || "0"} เคส · ${escapeHTML(r.mriDoctor) || "-"}</div></div>
      <div class="dg-item"><div class="dg-label">👤 ผู้ส่งเวร</div><div class="dg-value">${escapeHTML(r.sender) || "-"}</div></div>
      <div class="dg-item"><div class="dg-label">👤 ผู้รับเวร</div><div class="dg-value">${escapeHTML(r.receiver) || "-"}</div></div>
    </div>
    ${risky ? `<div class="day-risk"><b>⚠️ เหตุการณ์ความเสี่ยง:</b> ${escapeHTML(r.risk)}</div>` : ""}
    ${r.handoverNote ? `<div class="day-note"><b>🔄 สิ่งที่ต้องส่งต่อเวรถัดไป:</b> ${escapeHTML(r.handoverNote)}</div>` : ""}
    ${r.note ? `<div class="day-note"><b>📝 Note:</b> ${escapeHTML(r.note)}</div>` : ""}
  </div>`;
}

["f-date","f-name","f-risk"].forEach(id => {
  document.getElementById(id).addEventListener("input", render);
  document.getElementById(id).addEventListener("change", render);
});
document.getElementById("btn-clear").addEventListener("click", () => {
  document.getElementById("f-date").value = "";
  document.getElementById("f-name").value = "";
  document.getElementById("f-risk").value = "";
  render();
});
document.getElementById("btn-refresh").addEventListener("click", load);

load();
</script>
</body>
</html>
